<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조선오락실 - K-전통 놀이 웹 시뮬레이터</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel CDN (for JSX compilation in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 게임 데이터 정의
    const GAMES_DATA = [
      {
        id: 'seunggyeongdo',
        category: '보드 및 전략 시뮬레이션',
        title: '승경도',
        desc: '양반들이 즐기던 놀이로, 윤목을 던져 조선시대 관직을 오르는 교육적 보드게임.',
        playable: true,
        color: 'bg-amber-700'
      },
      {
        id: 'yutnori',
        category: '보드 및 전략 시뮬레이션',
        title: '윷놀이',
        desc: '네 개의 윷을 던져 도·개·걸·윷·모에 따라 말을 이동시키는 대표 명절 놀이.',
        playable: true,
        color: 'bg-orange-600'
      },
      {
        id: 'gonu',
        category: '보드 및 전략 시뮬레이션',
        title: '고누',
        desc: '땅바닥에 선을 그어 조약돌로 상대방의 말을 막거나 따내는 두뇌 퍼즐.',
        playable: true,
        color: 'bg-stone-600'
      },
      {
        id: 'tuho',
        category: '기술 및 액션 미니게임',
        title: '투호',
        desc: '일정 거리에서 화살을 병 안에 던져 넣는 놀이. 궤적과 힘 조절이 핵심!',
        playable: true,
        color: 'bg-emerald-700'
      },
      {
        id: 'kite',
        category: '기술 및 액션 미니게임',
        title: '연날리기',
        desc: '얼레를 조종해 연을 띄우고, 줄을 비벼 상대방의 줄을 끊는 짜릿한 액션.',
        playable: true,
        color: 'bg-sky-600'
      },
      {
        id: 'gyeokgu',
        category: '기술 및 액션 미니게임',
        title: '격구',
        desc: '막대기로 공을 쳐서 구멍에 넣는 경기. 팀 협동과 다이내믹한 움직임.',
        playable: true,
        color: 'bg-red-800'
      },
      {
        id: 'taekkyon',
        category: '대전 및 스포츠 게임',
        title: '택견',
        desc: '품밟기 리듬을 타며 상대방을 넘어뜨리는 전통 무술 대전.',
        playable: true,
        color: 'bg-indigo-700'
      },
      {
        id: 'ssireum',
        category: '대전 및 스포츠 게임',
        title: '씨름',
        desc: '샅바를 잡고 손과 발기술을 커맨드로 입력해 상대를 쓰러뜨리는 힘겨루기.',
        playable: true,
        color: 'bg-yellow-700'
      },
      {
        id: 'ganggang',
        category: '기타 웹 게임 요소',
        title: '강강술래',
        desc: '손을 맞잡고 원을 그리며 도는 소셜 리듬 퀘스트.',
        playable: true,
        color: 'bg-pink-600'
      },
      {
        id: 'biseok',
        category: '기타 웹 게임 요소',
        title: '비석치기',
        desc: '몸의 일부로 비석을 운반해 상대를 쓰러뜨리는 캐주얼 물리 액션.',
        playable: true,
        color: 'bg-slate-700'
      }
    ];

    const TuhoGame = ({ onExit }) => {
      const [arrows, setArrows] = useState(12);
      const [score, setScore] = useState(0);
      const [power, setPower] = useState(0);
      const [isAiming, setIsAiming] = useState(false);
      const [direction, setDirection] = useState(1);
      const [message, setMessage] = useState('버튼을 눌러 게이지를 조절하세요!');
      const [gameOver, setGameOver] = useState(false);
      
      const reqRef = useRef();

      // 힘 조절 게이지 애니메이션 루프
      useEffect(() => {
        if (isAiming) {
          const animate = () => {
            setPower((prev) => {
              let next = prev + direction * 2;
              if (next >= 100) {
                setDirection(-1);
                return 100;
              }
              if (next <= 0) {
                setDirection(1);
                return 0;
              }
              return next;
            });
            reqRef.current = requestAnimationFrame(animate);
          };
          reqRef.current = requestAnimationFrame(animate);
        }
        return () => cancelAnimationFrame(reqRef.current);
      }, [isAiming, direction]);

      const handleThrow = () => {
        if (arrows <= 0) return;
        
        if (!isAiming) {
          setIsAiming(true);
          setMessage('정중앙(초록색)에 왔을 때 던지세요!');
        } else {
          setIsAiming(false);
          setArrows((prev) => prev - 1);
          
          // 판정 (45 ~ 55 사이면 명중)
          if (power >= 42 && power <= 58) {
            setScore((prev) => prev + 1);
            setMessage('명중입니다! (나이스 투구)');
          } else {
            setMessage('아쉽게 빗나갔습니다!');
          }

          if (arrows - 1 === 0) {
            setGameOver(true);
            setMessage(`게임 종료! 최종 점수: ${score + (power >= 42 && power <= 58 ? 1 : 0)} / 12`);
          }
        }
      };

      const restart = () => {
        setArrows(12);
        setScore(0);
        setPower(0);
        setIsAiming(false);
        setGameOver(false);
        setMessage('버튼을 눌러 게이지를 조절하세요!');
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] bg-stone-100 rounded-2xl p-8 shadow-inner border-2 border-stone-300">
          <h2 className="text-3xl font-bold text-emerald-800 mb-2">투호놀이</h2>
          <p className="text-stone-600 mb-6">항아리에 화살을 던져 넣으세요! (남은 화살: {arrows})</p>

          <div className="flex items-end justify-center w-64 h-64 border-b-4 border-stone-800 relative mb-8">
            {/* 투호통 (항아리) */}
            <div className="w-24 h-40 bg-stone-700 rounded-b-xl relative flex justify-center shadow-lg">
              <div className="w-28 h-6 bg-stone-800 absolute -top-3 rounded-full border-2 border-stone-900"></div>
              {/* 꽂힌 화살들 시각화 */}
              {Array.from({ length: score }).map((_, i) => (
                <div key={i} className="w-1.5 h-20 bg-amber-200 absolute border border-amber-800" 
                    style={{ 
                      top: '-15px', 
                      left: `${15 + (i * 5) % 60}%`, 
                      transform: `rotate(${Math.random() * 20 - 10}deg)` 
                    }}>
                  <div className="w-2 h-3 bg-red-500 absolute -top-3 -left-[1px]"></div>
                </div>
              ))}
            </div>
          </div>

          <div className="w-full max-w-md bg-stone-300 h-8 rounded-full overflow-hidden relative mb-4">
            {/* 명중 존 (Sweet spot) */}
            <div className="absolute left-[42%] w-[16%] h-full bg-green-400 opacity-50"></div>
            {/* 파워 게이지 바 */}
            <div 
              className={`h-full ${isAiming ? 'bg-red-500' : 'bg-stone-500'} transition-all ease-linear`}
              style={{ width: `${power}%` }}
            ></div>
          </div>

          <p className="text-xl font-bold text-stone-800 mb-6 h-8">{message}</p>

          <div className="flex gap-4">
            {!gameOver ? (
              <button 
                onClick={handleThrow}
                className={`px-8 py-3 rounded-xl font-bold text-white shadow-lg transform transition active:scale-95 ${
                  isAiming ? 'bg-red-600 hover:bg-red-700' : 'bg-emerald-600 hover:bg-emerald-700'
                }`}
              >
                {isAiming ? '던지기!!' : '조준 시작'}
              </button>
            ) : (
              <button 
                onClick={restart}
                className="px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg"
              >
                다시 하기
              </button>
            )}
            <button onClick={onExit} className="px-6 py-3 rounded-xl font-bold text-stone-700 bg-stone-200 hover:bg-stone-300">
              돌아가기
            </button>
          </div>
        </div>
      );
    };

    const YutnoriGame = ({ onExit }) => {
      // 0: 평평한 면(배), 1: 둥근 면(등)
      const [sticks, setSticks] = useState([1, 1, 1, 1]); 
      const [isRolling, setIsRolling] = useState(false);
      const [result, setResult] = useState('');
      const [history, setHistory] = useState([]);

      const throwYut = () => {
        if (isRolling) return;
        setIsRolling(true);
        setResult('');
        
        setTimeout(() => {
          // 윷 던지기 확률 (완벽한 50:50보다는 배가 나올 확률이 약간 높음)
          const newSticks = Array.from({ length: 4 }, () => Math.random() > 0.4 ? 0 : 1);
          setSticks(newSticks);
          
          const flatCount = newSticks.filter(s => s === 0).length;
          let resText = '';
          switch(flatCount) {
            case 0: resText = '모! (5칸 이동)'; break;
            case 1: resText = '도 (1칸 이동)'; break;
            case 2: resText = '개 (2칸 이동)'; break;
            case 3: resText = '걸 (3칸 이동)'; break;
            case 4: resText = '윷! (4칸 이동)'; break;
            default: break;
          }
          
          setResult(resText);
          setHistory(prev => [resText, ...prev].slice(0, 5));
          setIsRolling(false);
        }, 600);
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] bg-orange-50 rounded-2xl p-8 shadow-inner border-2 border-orange-200">
          <h2 className="text-3xl font-bold text-orange-900 mb-2">윷놀이 던지기</h2>
          <p className="text-orange-700 mb-8">네 개의 윷을 던져 운을 시험해보세요!</p>

          {/* 윷 시각화 */}
          <div className={`flex gap-4 mb-12 ${isRolling ? 'animate-bounce' : ''}`}>
            {sticks.map((state, idx) => (
              <div key={idx} className="relative w-12 h-40 drop-shadow-xl transition-transform duration-500">
                {state === 1 ? (
                  // 둥근 면 (등) - X자 표시
                  <div className="w-full h-full bg-amber-800 rounded-t-full rounded-b-full flex flex-col items-center justify-center gap-4 border-2 border-amber-950">
                    <span className="text-amber-950 opacity-40 font-bold text-xl">X</span>
                    <span className="text-amber-950 opacity-40 font-bold text-xl">X</span>
                    <span className="text-amber-950 opacity-40 font-bold text-xl">X</span>
                  </div>
                ) : (
                  // 평평한 면 (배)
                  <div className="w-full h-full bg-amber-100 rounded-sm border-2 border-amber-300 shadow-inner flex justify-center items-center">
                    <div className="w-1/2 h-[90%] border border-amber-200 rounded-full"></div>
                  </div>
                )}
              </div>
            ))}
          </div>

          <div className="h-12 mb-6">
            {result && <div className="text-4xl font-black text-red-600 animate-pulse">{result}</div>}
          </div>

          <div className="flex gap-4 mb-8">
            <button 
              onClick={throwYut}
              disabled={isRolling}
              className="px-8 py-4 rounded-full font-bold text-xl text-white bg-orange-600 hover:bg-orange-700 shadow-[0_6px_0_rgb(194,65,12)] active:shadow-[0_0px_0_rgb(194,65,12)] active:translate-y-[6px] transition-all"
            >
              {isRolling ? '던지는 중...' : '윷 던지기!'}
            </button>
            <button onClick={onExit} className="px-6 py-4 rounded-full font-bold text-stone-700 bg-stone-200 hover:bg-stone-300 shadow-[0_6px_0_rgb(214,211,209)] active:shadow-none active:translate-y-[6px] transition-all">
              메인으로
            </button>
          </div>

          {history.length > 0 && (
            <div className="mt-4 w-full max-w-sm bg-white/50 p-4 rounded-xl border border-orange-200">
              <h3 className="font-bold text-stone-700 mb-2 border-b border-orange-200 pb-1">최근 기록</h3>
              <div className="flex gap-2 flex-wrap">
                {history.map((h, i) => (
                  <span key={i} className="px-3 py-1 bg-white rounded-md text-sm shadow-sm font-medium text-stone-600">{h}</span>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    const SeunggyeongdoGame = ({ onExit }) => {
      const RANKS = ['평민 (시작)', '종9품 참봉', '정7품 참군', '정5품 교리', '정3품 당상관', '정2품 판서', '정1품 우의정', '정1품 좌의정', '영의정 (승리!)'];
      const [position, setPosition] = useState(0);
      const [isRolling, setIsRolling] = useState(false);
      const [rollValue, setRollValue] = useState(0);

      const rollYunmok = () => {
        setIsRolling(true);
        setTimeout(() => {
          const move = Math.floor(Math.random() * 5) + 1; // 1~5 이동
          setRollValue(move);
          setPosition(prev => Math.min(prev + move, RANKS.length - 1));
          setIsRolling(false);
        }, 500);
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] bg-amber-50 rounded-2xl p-8 shadow-inner border-2 border-amber-200">
          <h2 className="text-3xl font-bold text-amber-900 mb-2">승경도</h2>
          <p className="text-amber-700 mb-8">윤목을 던져 가장 먼저 영의정에 오르세요!</p>

          <div className="w-full max-w-2xl bg-amber-100 p-6 rounded-xl border-2 border-amber-800 mb-8 grid grid-cols-3 gap-2">
            {RANKS.map((rank, idx) => (
              <div key={idx} className={`p-4 rounded-lg flex items-center justify-center text-center font-bold border-2 transition-all ${
                position === idx ? 'bg-amber-600 text-white border-amber-800 scale-105 shadow-lg' : 'bg-amber-50 text-amber-900 border-amber-300'
              }`}>
                {rank}
                {position === idx && <span className="absolute -top-3 -right-3 text-2xl">🐎</span>}
              </div>
            ))}
          </div>

          <div className="h-12 mb-4 text-xl font-bold text-amber-900">
            {rollValue > 0 && !isRolling && `${rollValue}칸 이동!`}
            {isRolling && '윤목 굴리는 중...'}
          </div>

          <div className="flex gap-4">
            {position < RANKS.length - 1 ? (
              <button onClick={rollYunmok} disabled={isRolling} className="px-8 py-3 rounded-xl font-bold text-white bg-amber-700 hover:bg-amber-800 shadow-lg disabled:opacity-50">
                윤목 던지기
              </button>
            ) : (
              <button onClick={() => { setPosition(0); setRollValue(0); }} className="px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg">
                새 관직 오르기 (재시작)
              </button>
            )}
            <button onClick={onExit} className="px-6 py-3 rounded-xl font-bold text-stone-700 bg-stone-200 hover:bg-stone-300">나가기</button>
          </div>
        </div>
      );
    };

    const GonuGame = ({ onExit }) => {
      const [board, setBoard] = useState(Array(9).fill(null));
      const [isPlayerTurn, setIsPlayerTurn] = useState(true);
      const [winner, setWinner] = useState(null);

      const checkWinner = (squares) => {
        const lines = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];
        for (let i = 0; i < lines.length; i++) {
          const [a, b, c] = lines[i];
          if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) return squares[a];
        }
        return squares.every(s => s !== null) ? 'draw' : null;
      };

      const handleClick = (i) => {
        if (board[i] || winner || !isPlayerTurn) return;
        const newBoard = [...board];
        newBoard[i] = '⚫'; // 흑돌 (플레이어)
        setBoard(newBoard);
        setIsPlayerTurn(false);
        
        const currentWinner = checkWinner(newBoard);
        if (currentWinner) { setWinner(currentWinner); return; }

        // 상대방(AI) 턴
        setTimeout(() => {
          const emptyIndices = newBoard.map((v, idx) => v === null ? idx : null).filter(v => v !== null);
          if (emptyIndices.length > 0) {
            const randomIdx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
            newBoard[randomIdx] = '⚪'; // 백돌 (AI)
            setBoard([...newBoard]);
            setWinner(checkWinner(newBoard));
            setIsPlayerTurn(true);
          }
        }, 600);
      };

      const restart = () => { setBoard(Array(9).fill(null)); setWinner(null); setIsPlayerTurn(true); };

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] bg-stone-100 rounded-2xl p-8 shadow-inner border-2 border-stone-300">
          <h2 className="text-3xl font-bold text-stone-800 mb-2">우물고누 (3x3)</h2>
          <p className="text-stone-600 mb-6">돌을 놓아 가로, 세로, 대각선 3줄을 먼저 맞추세요!</p>
          
          <div className="grid grid-cols-3 gap-2 bg-amber-800 p-3 rounded-xl mb-6 shadow-xl relative">
            {/* 나무 판자 느낌 배경 선 */}
            <div className="absolute inset-0 flex flex-col justify-evenly pointer-events-none px-6"><div className="w-full h-1 bg-amber-950/30"></div><div className="w-full h-1 bg-amber-950/30"></div></div>
            <div className="absolute inset-0 flex justify-evenly pointer-events-none py-6"><div className="h-full w-1 bg-amber-950/30"></div><div className="h-full w-1 bg-amber-950/30"></div></div>
            
            {board.map((cell, i) => (
              <button key={i} onClick={() => handleClick(i)} className="w-20 h-20 bg-amber-100/10 hover:bg-amber-100/20 rounded-lg text-5xl flex items-center justify-center z-10 transition-colors">
                {cell}
              </button>
            ))}
          </div>

          <div className="h-8 mb-4 text-xl font-bold text-stone-800">
            {winner === '⚫' && '🎉 승리했습니다!'}
            {winner === '⚪' && '패배했습니다...'}
            {winner === 'draw' && '무승부입니다!'}
            {!winner && (isPlayerTurn ? '당신의 차례입니다 (⚫)' : '상대방이 생각 중... (⚪)')}
          </div>

          <div className="flex gap-4">
            {winner && <button onClick={restart} className="px-8 py-3 rounded-xl font-bold text-white bg-stone-700 hover:bg-stone-800">다시 하기</button>}
            <button onClick={onExit} className="px-6 py-3 rounded-xl font-bold text-stone-700 bg-stone-200 hover:bg-stone-300">나가기</button>
          </div>
        </div>
      );
    };

    const KiteGame = ({ onExit }) => {
      const [myLine, setMyLine] = useState(100);
      const [enemyLine, setEnemyLine] = useState(100);
      const [gameOver, setGameOver] = useState(false);
      const [message, setMessage] = useState('버튼을 연타하여 상대방의 연줄을 끊으세요!');

      useEffect(() => {
        if (gameOver) return;
        const interval = setInterval(() => {
          setMyLine(prev => {
            const next = prev - (Math.random() * 5);
            if (next <= 0) { setGameOver(true); setMessage('패배! 내 연줄이 끊어졌습니다.'); return 0; }
            return next;
          });
        }, 500);
        return () => clearInterval(interval);
      }, [gameOver]);

      const attack = () => {
        if (gameOver) return;
        setEnemyLine(prev => {
          const next = prev - (Math.random() * 10 + 2);
          if (next <= 0) { setGameOver(true); setMessage('승리! 상대방의 연줄을 끊었습니다!'); return 0; }
          return next;
        });
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] bg-sky-50 rounded-2xl p-8 shadow-inner border-2 border-sky-200">
          <h2 className="text-3xl font-bold text-sky-900 mb-2">연날리기 연싸움</h2>
          <p className="text-sky-700 mb-8">{message}</p>

          <div className="flex w-full max-w-md justify-between items-end mb-8 px-4 h-48">
            {/* 내 연 */}
            <div className="flex flex-col items-center w-1/3">
              <div className={`text-6xl mb-2 transition-transform ${gameOver && myLine <= 0 ? 'translate-y-20 opacity-0' : 'animate-bounce'}`}>🪁</div>
              <div className="w-full bg-stone-200 h-6 rounded-full overflow-hidden">
                <div className="h-full bg-blue-500 transition-all" style={{width: `${myLine}%`}}></div>
              </div>

    const SsireumGame = ({ onExit }) => {

        if (gameOver) return;

    const GanggangGame = ({ onExit }) => {
      const [activeNode, setActiveNode] = useState(-1);
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(15);
      const [isPlaying, setIsPlaying] = useState(false);

      useEffect(() => {
        let timer, nodeTimer;
        if (isPlaying && timeLeft > 0) {
          timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
          nodeTimer = setInterval(() => setActiveNode(Math.floor(Math.random() * 6)), 600); // 6개의 노드
        } else if (timeLeft <= 0) {
          setIsPlaying(false);
          setActiveNode(-1);
        }
        return () => { clearInterval(timer); clearInterval(nodeTimer); };
      }, [isPlaying, timeLeft]);

      const hitNode = (index) => {
        if (index === activeNode) {
          setScore(prev => prev + 1);
          setActiveNode(-1); // 중복 클릭 방지
        }
      };

      const start = () => { setScore(0); setTimeLeft(15); setIsPlaying(true); };

      return (

                  className={`absolute w-16 h-16 -translate-x-1/2 -translate-y-1/2 rounded-full border-4 shadow-lg transition-all flex items-center justify-center text-2xl ${

          </div>
        </div>
      );

    const BiseokGame = ({ onExit }) => {
      const [targetPos, setTargetPos] = useState(0);
      const [direction, setDirection] = useState(1);
      const [isThrown, setIsThrown] = useState(false);
      const [result, setResult] = useState('');

      const reqRef = useRef();

      useEffect(() => {
        if (!isThrown) {
          const animate = () => {
            setTargetPos(prev => {
              let next = prev + direction * 1.5;
              if (next >= 100) { setDirection(-1); return 100; }
              if (next <= 0) { setDirection(1); return 0; }
              return next;
            });
            reqRef.current = requestAnimationFrame(animate);
          };
          reqRef.current = requestAnimationFrame(animate);
        }
        return () => cancelAnimationFrame(reqRef.current);
      }, [isThrown, direction]);

      const throwBiseok = () => {
        if (isThrown) return;
        setIsThrown(true);
        // 초록색 영역 (40% ~ 60%)
        if (targetPos >= 40 && targetPos <= 60) {
          setResult('명중! 비석이 쓰러졌습니다!');
        } else {
          setResult('빗나갔습니다...');
        }
      };

      const restart = () => { setIsThrown(false); setResult(''); };

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] bg-slate-100 rounded-2xl p-8 shadow-inner border-2 border-slate-300">
          <h2 className="text-3xl font-bold text-slate-800 mb-2">비석치기</h2>

            {/* 던진 내 비석 */}
            {isThrown && (
              <div className="absolute top-4 w-10 h-6 bg-slate-400 border border-slate-600 rounded-sm animate-[bounce_0.5s_ease-out_forwards]" style={{ left: `calc(${targetPos}% - 20px)` }}></div>
            )}

          <div className="h-8 mb-6 font-bold text-xl text-slate-800">{result}</div>

          <div className="flex gap-4">
            {!isThrown ? (
              <button onClick={throwBiseok} className="px-10 py-4 rounded-xl font-black text-white bg-slate-700 hover:bg-slate-800 shadow-xl active:scale-95">비석 던지기!</button>
            ) : (
              <button onClick={restart} className="px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700">다시 던지기</button>
            )}
            <button onClick={onExit} className="px-6 py-3 rounded-xl font-bold text-stone-700 bg-stone-300 hover:bg-stone-400">나가기</button>
          </div>
        </div>
      );
    };

                <div className="w-4 h-4 rounded-full bg-red-600"></div>

                <div className="w-4 h-4 rounded-full bg-yellow-500"></div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-12">
            {activeGame ? (
              /* 게임 플레이 영역 */
              <div className="animate-in fade-in zoom-in-95 duration-300">
                {renderGameArea()}
              </div>
            ) : (
              /* 메인 대시보드 영역 */
              <div className="space-y-16 animate-in fade-in duration-500">
                {Object.entries(categories).map(([categoryName, games]) => (
                  <section key={categoryName}>
                    <h2 className="text-2xl font-bold text-stone-800 mb-6 flex items-center gap-3">
                      <span className="w-8 h-1 bg-red-700 rounded-full inline-block"></span>
                      {categoryName}
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {games.map((game) => (
                        <div 
                          key={game.id} 
                          className="group relative bg-white rounded-2xl p-6 border border-stone-200 shadow-sm hover:shadow-xl transition-all duration-300 cursor-pointer overflow-hidden transform hover:-translate-y-1"
                          onClick={() => setActiveGame(game)}
                        >
                          {/* 카드 상단 장식 */}
                          <div className={`absolute top-0 left-0 w-full h-2 ${game.color}`}></div>
                          
                          <div className="flex justify-between items-start mb-4 mt-2">
                            <h3 className="text-xl font-bold text-stone-900">{game.title}</h3>
                            {game.playable ? (
                              <span className="px-3 py-1 bg-green-100 text-green-800 text-xs font-bold rounded-full animate-pulse">
                                플레이 가능
                              </span>
                            ) : (
                              <span className="px-3 py-1 bg-stone-100 text-stone-500 text-xs font-bold rounded-full">
                                준비 중
                              </span>
                            )}
                          </div>
                          
                          <p className="text-stone-600 text-sm leading-relaxed mb-6 h-10">
                            {game.desc}
                          </p>
                          
                          <div className="flex justify-end mt-4">
                            <button className={`px-5 py-2 rounded-lg font-semibold text-sm transition-colors ${
                              game.playable 
                                ? 'bg-stone-900 text-white group-hover:bg-red-700' 
                                : 'bg-stone-100 text-stone-400 group-hover:bg-stone-200'
                            }`}>
                              {game.playable ? '입장하기 →' : '살펴보기'}
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>
                ))}
              </div>
            )}
          </main>

          {/* 푸터 */}
          <footer className="bg-stone-200 text-stone-500 py-8 text-center border-t border-stone-300 mt-12">
            <p className="font-medium">© 2026 조선오락실 - 전통과 현대 웹 기술의 만남</p>
          </footer>
        </div>
      );
    }

    // React 애플리케이션 마운트
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<JoseonArcade />);
  </script>
</body>
</html>
